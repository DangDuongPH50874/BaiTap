spring.application.name=BaiTap

# Default profile: dev (override with -Dspring.profiles.active=prod/test if needed)
spring.profiles.active=dev

# --- JPA ---
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

# --- Server ---
server.port=8080

# --- JWT (override in prod) ---
app.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# --- Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html
